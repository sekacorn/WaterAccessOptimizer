server:
  port: 8087

spring:
  application:
    name: data-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisDialect
        jdbc:
          lob:
            non_contextual_creation: true

  # Flyway Database Migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    schemas: public

  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

# JWT Configuration (for validation only)
jwt:
  secret: ${JWT_SECRET}

# Application Configuration
app:
  name: WaterAccessOptimizer
  url: ${APP_URL:http://localhost:3000}

  # Storage Quota Configuration
  storage:
    default-quota-mb: 100.0    # 100 MB for free tier
    admin-quota-mb: 1000.0     # 1 GB for admins
    retention-days: 30         # Soft delete retention period

  # Validation Configuration
  validation:
    max-rows: 1000             # Maximum rows per CSV file
    enable-who-checks: true    # Enable WHO guideline checks
    enable-semantic: true      # Enable cross-row validation
    enable-quality: true       # Enable quality assessment

# Logging (Structured JSON)
logging:
  level:
    com.water: INFO
    org.springframework.security: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/water-optimizer/data-service.log
    max-size: 100MB
    max-history: 7

# Actuator & Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    distribution:
      percentiles-histogram:
        http.server.requests: true

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: false
    path: /api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    displayRequestDuration: true
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
