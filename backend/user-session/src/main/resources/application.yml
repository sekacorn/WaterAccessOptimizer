server:
  port: 8083

spring:
  application:
    name: user-session

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wateraccess}
    username: ${SPRING_DATASOURCE_USERNAME:wateradmin}
    password: ${SPRING_DATASOURCE_PASSWORD:waterpass123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    timeout: 60000

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-minimum-256-bits-long}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# Logging
logging:
  level:
    com.water: DEBUG
    org.springframework: INFO

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
