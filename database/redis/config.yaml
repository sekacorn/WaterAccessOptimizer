# Redis configuration for WaterAccessOptimizer
# Used for caching and session management

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Logging
loglevel notice
logfile ""

# Security (set password in production)
# requirepass your-strong-password-here

# Performance
timeout 300
tcp-keepalive 60
databases 16
