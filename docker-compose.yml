version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: water-postgres
    environment:
      POSTGRES_DB: wateraccess
      POSTGRES_USER: wateradmin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-waterpass123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - water-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wateradmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: water-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./database/redis/config.yaml:/usr/local/etc/redis/redis.conf
    networks:
      - water-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Water Integrator Service
  water-integrator:
    build:
      context: ./backend/water-integrator
      dockerfile: Dockerfile
    container_name: water-integrator
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wateraccess
      SPRING_DATASOURCE_USERNAME: wateradmin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-waterpass123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - water-network

  # Water Visualizer Service
  water-visualizer:
    build:
      context: ./backend/water-visualizer
      dockerfile: Dockerfile
    container_name: water-visualizer
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wateraccess
      SPRING_DATASOURCE_USERNAME: wateradmin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-waterpass123}
      AI_SERVICE_URL: http://ai-model:8000
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - ai-model
    networks:
      - water-network

  # User Session Service
  user-session:
    build:
      context: ./backend/user-session
      dockerfile: Dockerfile
    container_name: user-session
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wateraccess
      SPRING_DATASOURCE_USERNAME: wateradmin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-waterpass123}
      SPRING_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - redis
    networks:
      - water-network

  # LLM Service
  llm-service:
    build:
      context: ./backend/llm-service
      dockerfile: Dockerfile
    container_name: llm-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wateraccess
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1}
    ports:
      - "8084:8084"
    depends_on:
      - postgres
    networks:
      - water-network

  # Collaboration Service
  collaboration-service:
    build:
      context: ./backend/collaboration-service
      dockerfile: Dockerfile
    container_name: collaboration-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wateraccess
      SPRING_REDIS_HOST: redis
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - redis
    networks:
      - water-network

  # API Gateway
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      WATER_INTEGRATOR_URL: http://water-integrator:8081
      WATER_VISUALIZER_URL: http://water-visualizer:8082
      USER_SESSION_URL: http://user-session:8083
      LLM_SERVICE_URL: http://llm-service:8084
      COLLABORATION_SERVICE_URL: http://collaboration-service:8085
    ports:
      - "8080:8080"
    depends_on:
      - water-integrator
      - water-visualizer
      - user-session
      - llm-service
      - collaboration-service
    networks:
      - water-network

  # AI Model Service (Python/PyTorch)
  ai-model:
    build:
      context: ./ai-model
      dockerfile: Dockerfile
    container_name: ai-model
    environment:
      MODEL_PATH: /app/model.pt
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    networks:
      - water-network

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: water-frontend
    environment:
      VITE_API_GATEWAY_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8085
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - water-network

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: water-nginx
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - api-gateway
    networks:
      - water-network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: water-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - water-network
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: water-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - water-network
    restart: unless-stopped

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: water-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://wateradmin:${DB_PASSWORD:-waterpass123}@postgres:5432/wateraccess?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - water-network
    restart: unless-stopped

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: water-redis-exporter
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - water-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  water-network:
    driver: bridge
