# Kubernetes Secrets (Base64 encoded)
# IMPORTANT: This is a template - replace values with actual base64-encoded secrets
# To encode: echo -n 'your-secret' | base64

apiVersion: v1
kind: Secret
metadata:
  name: water-optimizer-secrets
  namespace: water-optimizer
type: Opaque
data:
  # PostgreSQL password (base64 encoded)
  # Example: echo -n 'your_password' | base64
  POSTGRES_PASSWORD: eW91cl9zZWN1cmVfcGFzc3dvcmRfaGVyZQ==

  # JWT Secret (base64 encoded)
  # Should be at least 256 bits
  # Example: openssl rand -base64 32
  JWT_SECRET: eW91cl9qd3Rfc2VjcmV0X2tleV9taW5fMjU2X2JpdHNfaGVyZQ==

  # Grafana admin password (base64 encoded)
  GRAFANA_PASSWORD: eW91cl9ncmFmYW5hX3Bhc3N3b3JkX2hlcmU=

---
# Note: In production, use external secrets management:
# - Sealed Secrets (sealed-secrets)
# - External Secrets Operator
# - HashiCorp Vault
# - AWS Secrets Manager
# - Azure Key Vault
# - Google Secret Manager
